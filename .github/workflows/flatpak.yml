name: Flatpak

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  # Manual runs rebuild the flatpak for the LATEST release and re-mirror it
  # to R2 — the backfill path when the mirror below was added after a
  # release, or when a flatpak needs regenerating without a new tag.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-22.04
    # Serialize runs from tags pushed in quick succession: a slower build for
    # an older release must not finish after a newer one and overwrite the
    # release asset and latest/clai.flatpak with stale content.
    concurrency:
      group: flatpak-build
      cancel-in-progress: false
    # Manual dispatches only count from main: a branch dispatch would build
    # the flatpak from that branch's packaging files and overwrite both the
    # release asset and the latest/ mirror with unreleased content.
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
            }).then(r => r.data);
            const debAsset = release.assets.find(a => a.name.endsWith('.deb'));
            return {
              id: release.id,
              tag: release.tag_name,
              deb_url: debAsset ? debAsset.browser_download_url : null
            };

      - name: Download deb package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Env indirection, not ${{ }} inline in the script: a quote in the
          # API-provided JSON must never be able to alter shell source.
          RELEASE_JSON: ${{ steps.release.outputs.result }}
        run: |
          RELEASE_TAG=$(printf '%s' "$RELEASE_JSON" | jq -r '.tag')
          gh release download "$RELEASE_TAG" --pattern "*.deb" --output clai.deb

      - name: Extract binary from deb
        run: |
          ar x clai.deb
          tar xf data.tar.*
          ls -la usr/bin/

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Create Flatpak
        run: |
          # Initialize flatpak build directory
          flatpak build-init flatpak-build run.clai.CLAI org.gnome.Sdk//49 org.gnome.Platform//49

          # Copy files into the build
          mkdir -p flatpak-build/files/bin
          mkdir -p flatpak-build/files/share/applications
          mkdir -p flatpak-build/files/share/icons/hicolor/128x128/apps
          mkdir -p flatpak-build/files/share/icons/hicolor/scalable/apps
          mkdir -p flatpak-build/files/share/metainfo
          mkdir -p flatpak-build/files/share/licenses/run.clai.CLAI

          cp usr/bin/clai flatpak-build/files/bin/
          cp flatpak/run.clai.CLAI.desktop flatpak-build/files/share/applications/
          cp src-tauri/icons/128x128.png flatpak-build/files/share/icons/hicolor/128x128/apps/run.clai.CLAI.png
          cp public/icon.svg flatpak-build/files/share/icons/hicolor/scalable/apps/run.clai.CLAI.svg
          cp flatpak/run.clai.CLAI.metainfo.xml flatpak-build/files/share/metainfo/
          cp LICENSE flatpak-build/files/share/licenses/run.clai.CLAI/

          # Finalize the build
          #
          # --talk-name=org.freedesktop.Flatpak is REQUIRED: clai runs the
          # AI provider CLIs (claude/codex/…) and its bash_exec sandbox on
          # the HOST via `flatpak-spawn --host`. The host-spawn portal is
          # gated behind this name; without it both the provider CLIs and
          # the sandboxed shell fail. The bash_exec sandbox runs the host's
          # bwrap through flatpak-spawn because nested user namespaces are
          # blocked inside Flatpak's own sandbox.
          # --socket=x11 (NOT fallback-x11) is REQUIRED for image paste: arboard
          # reads the image clipboard via the Wayland data-control protocol,
          # which GNOME/Mutter does not implement, so it falls back to the X11
          # (XWayland) clipboard. fallback-x11 withholds the X11 socket whenever
          # Wayland is present, silently breaking Ctrl+V image paste.
          flatpak build-finish flatpak-build \
            --command=clai \
            --share=ipc \
            --share=network \
            --socket=x11 \
            --socket=wayland \
            --device=dri \
            --filesystem=home \
            --talk-name=org.freedesktop.secrets \
            --talk-name=org.freedesktop.Flatpak

          # Export and bundle
          flatpak build-export repo flatpak-build
          flatpak build-bundle repo clai.flatpak run.clai.CLAI

      - name: Upload to Release
        uses: actions/github-script@v7
        env:
          # Same env indirection as the shell steps: never inline the
          # API-provided JSON into script source.
          RELEASE_JSON: ${{ steps.release.outputs.result }}
        with:
          script: |
            const fs = require('fs');
            const releaseId = JSON.parse(process.env.RELEASE_JSON).id;

            // Check if asset already exists and delete it
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            });
            const existingAsset = assets.data.find(a => a.name === 'clai.flatpak');
            if (existingAsset) {
              console.log('Deleting existing clai.flatpak asset...');
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existingAsset.id
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'clai.flatpak',
              data: fs.readFileSync('clai.flatpak')
            });

      # The Release workflow's sync-to-r2 job runs before this workflow even
      # starts (workflow_run fires on completion), so clai.flatpak is never
      # in the release when that mirror executes. Mirror it from here instead,
      # with the same guards: silent no-op without secrets, tag-shape
      # validation, immutable versioned copy, and a latest/ alias that
      # pre-releases never touch.
      - name: Check R2 credentials
        id: creds
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          # Env indirection, not ${{ }} inline in the script: a quote in the
          # API-provided JSON must never be able to alter shell source.
          RELEASE_JSON: ${{ steps.release.outputs.result }}
        run: |
          TAG=$(printf '%s' "$RELEASE_JSON" | jq -r '.tag')
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ] || [ -z "$R2_ACCOUNT_ID" ]; then
            echo "::notice::R2 secrets not configured; skipping flatpak mirror."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            # The tag becomes an R2 object-key prefix; refuse surprising
            # shapes (slashes etc.) before any aws call sees it.
            if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+(\.[0-9]+)*(-[0-9A-Za-z.]+)*$'; then
              echo "::error::Unexpected tag format: $TAG"
              exit 1
            fi
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror flatpak to R2
        if: steps.creds.outputs.configured == 'true'
        env:
          BUCKET: clai-releases
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          # R2 does not implement the newer S3 integrity checksums that recent
          # AWS CLI versions send by default; "when_required" is Cloudflare's
          # documented compatibility setting.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          RELEASE_JSON: ${{ steps.release.outputs.result }}
        run: |
          TAG=$(printf '%s' "$RELEASE_JSON" | jq -r '.tag')
          aws s3 cp clai.flatpak "s3://$BUCKET/$TAG/clai.flatpak" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable"
          # getLatestRelease never returns pre-releases, but keep the same
          # guard as the main mirror in case that lookup ever changes.
          case "$TAG" in
            *beta*|*alpha*)
              echo "Pre-release $TAG: leaving latest/ untouched."
              exit 0
              ;;
          esac
          aws s3 cp clai.flatpak "s3://$BUCKET/latest/clai.flatpak" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "public, max-age=300"
